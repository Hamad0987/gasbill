
{% block auth_content %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gas Bill System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; }
.hero {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
}
.hero::before {
    content: '';
    position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at center, rgba(102,126,234,0.15) 0%, transparent 60%);
    animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
.hero-content { text-align: center; z-index: 1; }
.logo-icon {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, #f5a623, #f53703);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 2.5rem; color: white;
    box-shadow: 0 0 40px rgba(245,166,35,0.5);
    animation: glow 2s ease-in-out infinite alternate;
}
@keyframes glow { from{box-shadow:0 0 20px rgba(245,166,35,0.3)} to{box-shadow:0 0 60px rgba(245,166,35,0.8)} }
h1 { color: white; font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; }
.subtitle { color: rgba(255,255,255,0.6); font-size: 1.1rem; margin-bottom: 50px; }
.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 500px; margin: 0 auto; }
.portal-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 35px 25px; text-decoration: none;
    transition: all 0.3s; cursor: pointer;
}
.portal-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
.portal-card .icon { font-size: 2.5rem; margin-bottom: 12px; }
.portal-card h3 { color: white; font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
.portal-card p { color: rgba(255,255,255,0.5); font-size: 0.8rem; }
.admin-card .icon { color: #f5a623; }
.customer-card .icon { color: #667eea; }
.features { display: flex; gap: 30px; justify-content: center; margin-top: 40px; flex-wrap: wrap; }
.feature { color: rgba(255,255,255,0.5); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
.feature i { color: #28a745; }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-content">
    <div class="logo-icon"><i class="fas fa-fire-flame-curved"></i></div>
    <h1>Gas Bill System</h1>
    <p class="subtitle">Professional Gas Bill Management Portal</p>

    <div class="card-grid">
      <a href="/login/?role=admin" class="portal-card admin-card">
        <div class="icon"><i class="fas fa-user-shield"></i></div>
        <h3>Admin Portal</h3>
        <p>Manage bills & customers</p>
      </a>
      <a href="/login/?role=customer" class="portal-card customer-card">
        <div class="icon"><i class="fas fa-user"></i></div>
        <h3>Customer Portal</h3>
        <p>View your bills</p>
      </a>
    </div>

    <div class="features">
      <span class="feature"><i class="fas fa-check"></i> OTP Verification</span>
      <span class="feature"><i class="fas fa-check"></i> Bill History</span>
      <span class="feature"><i class="fas fa-check"></i> PDF Print</span>
      <span class="feature"><i class="fas fa-check"></i> Yearly Average</span>
    </div>
  </div>
</div>
</body>
</html>
{% endblock %}
