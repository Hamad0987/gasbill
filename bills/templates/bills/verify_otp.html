{% extends 'bills/base.html' %}
{% block auth_content %}
<div style="min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;">
<div class="card p-5 text-center" style="width:420px;">
  <i class="fas fa-envelope-open-text fa-3x mb-3" style="color:#f5a623;"></i>
  <h3 class="fw-bold">Email Verify Karo</h3>
  <p class="text-muted">OTP bheja gaya hai: <strong>{{ email }}</strong></p>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <input type="text" name="otp" class="form-control form-control-lg text-center mb-3" placeholder="6-digit OTP" maxlength="6" required style="font-size:1.5rem;letter-spacing:8px;">
    <button type="submit" class="btn btn-primary w-100 btn-lg">Verify <i class="fas fa-check ms-2"></i></button>
  </form>
</div>
</div>
{% endblock %}
