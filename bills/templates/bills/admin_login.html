{% extends 'bills/base.html' %}
{% block auth_content %}
<div style="min-height:100vh;background:linear-gradient(135deg,#1a0a00,#3d1a00,#1a1a2e);display:flex;align-items:center;justify-content:center;">
<div style="width:440px;">
  <div class="text-center mb-4">
    <div style="width:75px;height:75px;background:linear-gradient(135deg,#f5a623,#f53703);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:1.8rem;color:white;box-shadow:0 0 30px rgba(245,166,35,0.5);">
      <i class="fas fa-user-shield"></i>
    </div>
    <h3 style="color:white;font-weight:800;font-size:1.7rem;">Admin Portal</h3>
    <p style="color:rgba(255,255,255,0.4);font-size:0.9rem;">Authorized personnel only</p>
  </div>
  <div style="background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(245,166,35,0.2);border-radius:24px;padding:40px;">
    {% if error %}
    <div class="alert border-0" style="border-radius:12px;background:rgba(220,53,69,0.2);color:#ff6b7a;border:1px solid rgba(220,53,69,0.3)!important;">
      <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="role" value="admin">
      <div class="mb-3">
        <label style="color:rgba(255,255,255,0.7);font-size:0.85rem;font-weight:600;margin-bottom:8px;display:block;">
          <i class="fas fa-envelope me-2"></i>Admin Email
        </label>
        <input type="email" name="email" class="form-control form-control-lg"
          placeholder="admin@example.com" required
          style="background:rgba(255,255,255,0.07);border:1px solid rgba(245,166,35,0.25);color:white;border-radius:12px;">
      </div>
      <div class="mb-4">
        <label style="color:rgba(255,255,255,0.7);font-size:0.85rem;font-weight:600;margin-bottom:8px;display:block;">
          <i class="fas fa-lock me-2"></i>Password
        </label>
        <input type="password" name="password" class="form-control form-control-lg"
          placeholder="••••••••" required
          style="background:rgba(255,255,255,0.07);border:1px solid rgba(245,166,35,0.25);color:white;border-radius:12px;">
      </div>
      <button type="submit" class="btn w-100 btn-lg fw-bold"
        style="background:linear-gradient(135deg,#f5a623,#f53703);color:white;border:none;border-radius:12px;padding:14px;font-size:1rem;box-shadow:0 4px 15px rgba(245,166,35,0.4);">
        Admin Login &nbsp;<i class="fas fa-arrow-right"></i>
      </button>
    </form>
    <hr style="border-color:rgba(255,255,255,0.08);margin:25px 0;">
    <p class="text-center mb-0"><a href="/" style="color:rgba(255,255,255,0.3);font-size:0.85rem;">← Home</a></p>
  </div>
</div>
</div>
<style>
input::placeholder { color: rgba(255,255,255,0.2) !important; }
input:focus { background: rgba(255,255,255,0.1) !important; border-color: rgba(245,166,35,0.6) !important; color: white !important; box-shadow: 0 0 0 3px rgba(245,166,35,0.15) !important; }
</style>
{% endblock %}
