{% extends 'bills/base.html' %}
{% block page_title %}Add Customer{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<div class="card p-4">
  <h5 class="fw-bold mb-4"><i class="fas fa-user-plus me-2" style="color:#667eea"></i>Add New Customer</h5>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="fw-bold">First Name</label>
        <input type="text" name="first_name" class="form-control" placeholder="First Name" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="fw-bold">Last Name</label>
        <input type="text" name="last_name" class="form-control" placeholder="Last Name" required>
      </div>
    </div>
    <div class="mb-3">
      <label class="fw-bold">Email</label>
      <input type="email" name="email" class="form-control" placeholder="email@gmail.com" required>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="fw-bold">Phone</label>
        <input type="text" name="phone" class="form-control" placeholder="03001234567" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="fw-bold">Meter Number</label>
        <input type="text" name="meter_no" class="form-control" placeholder="Meter No" required>
      </div>
    </div>
    <div class="mb-3">
      <label class="fw-bold">Address</label>
      <textarea name="address" class="form-control" rows="2" placeholder="Full Address"></textarea>
    </div>
    <div class="mb-3">
      <label class="fw-bold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>
    <div class="mb-3">
      <label class="fw-bold">Profile Picture (Optional)</label>
      <input type="file" name="profile_pic" class="form-control" accept="image/*">
    </div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <button type="submit" class="btn btn-primary w-100 btn-lg">
      <i class="fas fa-user-plus me-2"></i>Add Customer
    </button>
  </form>
</div>
</div>
</div>
{% endblock %}
