{% extends 'bills/base.html' %}
{% block auth_content %}
<div style="min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;">
<div class="card p-5 text-center" style="width:420px;">
  <i class="fas fa-lock fa-3x mb-3" style="color:#f5a623;"></i>
  <h3 class="fw-bold">Forgot Password?</h3>
  <p class="text-muted">Email daalo — reset link bhejenge</p>
  {% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <input type="email" name="email" class="form-control form-control-lg mb-3" placeholder="Email Address" required>
    <button type="submit" class="btn btn-primary w-100 btn-lg">Send Reset Link</button>
  </form>
  <hr>
  <a href="/login/">← Wapas Login pe jao</a>
</div>
</div>
{% endblock %}
